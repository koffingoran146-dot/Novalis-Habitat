user_code = user_code.replace("body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt)}",

# Ajouter login UI dans body juste après <body>
body_injection = """
  <!-- 🔒 Connexion requise -->
  <div id="alert-login">
    <form id="login-form">
      <h2>Connexion requise</h2>
      <input id="login-email" type="email" placeholder="Email" required>
      <input id="login-pass" type="password" placeholder="Mot de passe" required>
      <button type="submit">Se connecter</button>
      <button type="button" id="btn-create">Créer un compte</button>
    </form>
  </div>
  <div id="site-content" style="display:none">
"""
user_code = user_code.replace("<body>", "<body>" + body_injection)

# Fermer le wrapper avant </body>
user_code = user_code.replace("</body>", "</div><!-- fin site-content -->\n</body>")

# Injecter script modifié: remplacer partie refreshUI
script_patch = """
    // === Gestion connexion requise ===
    async function refreshUI(user){
      CURRENT_USER = user || null;
      const siteContent=document.getElementById("site-content");
      const alertLogin=document.getElementById("alert-login");
      if(user){
        alertLogin.style.display="none";
        siteContent.style.display="block";
        $("#fiche-nom").textContent=(user.user_metadata?.name)||"-"; 
        $("#fiche-email").textContent=user.email||"-";
      } else {
        alertLogin.style.display="flex";
        siteContent.style.display="none";
        $("#fiche-nom").textContent="-"; 
        $("#fiche-email").textContent="-";
      }
    }
    document.getElementById("login-form").addEventListener("submit", async (e)=>{
      e.preventDefault();
      const email=$("#login-email").value.trim();
      const pass=$("#login-pass").value;
      const { error } = await supabase.auth.signInWithPassword({ email, password:pass });
      if(error){ alert(error.message); }
    });
    document.getElementById("btn-create").addEventListener("click", ()=>{
      const modal=document.getElementById("insc-modal");
      if(modal){ modal.classList.add("open"); }
    });
    supabase.auth.onAuthStateChange(async (_e, session)=>{ await refreshUI(session?.user || null); });
    const { data: { session } } = await supabase.auth.getSession(); 
    await refreshUI(session?.user || null);
"""
# On append à la fin
user_code = user_code.replace("// démarrage", script_patch + "\n    // démarrage")

# Écrire fichier final
output_path = "/mnt/data/index_fusionne.html"
with open(output_path, "w", encoding="utf-8") as f:
    f.write(user_code)
