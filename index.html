<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>NovalisHabitat.CI</title>
  <meta name="theme-color" content="#ff7f00"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" defer></script>
  <style>
    :root{
      --orange:#ff7f00;
      --green:#16a34a;
      --greenSoft:#d1fae5;
      --txt:#0f172a;
      --muted:#6b7280;
      --bd:#e5e7eb;
      --bg:#FFF4E6
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt)}

    /* === plein écran login === */
    #alert-login {
      position:fixed;
      inset:0;
      background:#0f1530;
      color:#e9eefb;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      font-size:18px;
      font-weight:600;
      z-index:99999;
    }
    #login-form {
      background:#fff;
      color:#0f172a;
      padding:20px;
      border-radius:12px;
      display:flex;
      flex-direction:column;
      gap:12px;
      min-width:280px;
      max-width:320px;
      box-shadow:0 8px 20px rgba(0,0,0,.25);
    }
    #login-form input {
      padding:10px;
      border:1px solid var(--bd);
      border-radius:8px;
      font-size:14px;
    }
    #login-form button {
      padding:10px;
      border:none;
      border-radius:8px;
      background:var(--orange);
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }
    #login-form button:hover {
      opacity:.9;
    }
  </style>
</head>
<body>
  <!-- 🔒 Écran bloquant si pas connecté -->
  <div id="alert-login">
    Connexion requise
    <form id="login-form">
      <input id="login-email" type="email" placeholder="Email" required>
      <input id="login-pass" type="password" placeholder="Mot de passe" required>
      <button type="submit">Se connecter</button>
      <button type="button" id="btn-create">Créer un compte</button>
    </form>
  </div>

  <!-- 🔓 Site complet masqué tant qu’il n’y a pas de session -->
  <div id="site-content" style="display:none">
    <!-- === Ici tout ton code original (header, cartes, filtres, modals, footer, etc.) === -->
    <!-- Je ne l’ai pas touché, juste encapsulé -->
    
    <!-- Exemple début -->
    <div id="pdf-bar" class="container">
      <button id="btnPdf" class="btn">Télécharger ma fiche (PDF)</button>
    </div>
    <section id="fiche">
      <h2>Ma fiche</h2>
      <p>Nom : <span id="fiche-nom">-</span></p>
      <p>Email : <span id="fiche-email">-</span></p>
    </section>
    <!-- ... et tout le reste de ton index inchangé ... -->

  </div><!-- fin #site-content -->

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // === SUPABASE ===
    const SUPABASE_URL  = "https://qqznxwctxnenxxidaxrm.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFxem54d2N0eG5lbnh4aWRheHJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU1ODA0NDEsImV4cCI6MjA3MTE1NjQ0MX0.mIGXN4XYDyqULrqI1wekXb-xQTaHuYxqihRv9lI1ZiU";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

    let CURRENT_USER=null;
    const $=(s,r=document)=>r.querySelector(s);

    // === refreshUI modifié ===
    async function refreshUI(user){
      CURRENT_USER = user || null;
      const fiche=$("#fiche"), pdfbar=$("#pdf-bar"), alertLogin=$("#alert-login");
      const siteContent=document.getElementById("site-content");

      if (user){
        alertLogin.style.display="none";   // cache l’écran login
        siteContent.style.display="block"; // débloque le site
        fiche.style.display="block"; 
        pdfbar.style.display="flex";
        $("#fiche-nom").textContent=(user.user_metadata?.name)||"-"; 
        $("#fiche-email").textContent=user.email||"-";
      } else {
        alertLogin.style.display="flex";   // affiche blocage
        siteContent.style.display="none";  // masque site
        fiche.style.display="none"; 
        pdfbar.style.display="none";
        $("#fiche-nom").textContent="-"; 
        $("#fiche-email").textContent="-";
      }
    }

    // === gestion du formulaire login ===
    $("#login-form").addEventListener("submit", async (e)=>{
      e.preventDefault();
      const email=$("#login-email").value.trim();
      const pass=$("#login-pass").value;
      const { error } = await supabase.auth.signInWithPassword({ email, password:pass });
      if(error){ alert(error.message); return; }
    });
    $("#btn-create").addEventListener("click", ()=>{
      // Ouvre ton modal inscription existant
      document.getElementById("alert-login").style.display="none";
      const modal=document.getElementById("insc-modal");
      if(modal){ modal.classList.add("open"); }
    });

    // === écouteur de session Supabase ===
    supabase.auth.onAuthStateChange(async (_e, session)=>{ await refreshUI(session?.user || null); });
    const { data: { session } } = await supabase.auth.getSession(); 
    await refreshUI(session?.user || null);

    // === Ton JS original (render, carte, modals, bot, etc.) reste inchangé ===
  </script>
</body>
</html>
